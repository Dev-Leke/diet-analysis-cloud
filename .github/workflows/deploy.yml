# .github/workflows/deploy.yml
# CI pipeline: on every push/PR to main, test the Python code and build the
# Docker image. Catches breakage automatically before it reaches anyone else.

name: CI Pipeline

# WHEN the workflow runs
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ---- JOB 1: run the Python tests ----
  test:
    runs-on: ubuntu-latest        # the fresh cloud machine (runner)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4   # pull the repo onto the runner

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest -v

  # ---- JOB 2: build the Docker image (only if tests passed) ----
  build:
    runs-on: ubuntu-latest
    needs: test                   # wait for 'test' to succeed first
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t diet-analysis .

      - name: Verify the image exists
        run: docker images diet-analysis
